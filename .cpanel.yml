---
deployment:
  tasks:
    # 1. Definir variables y path de destino
    - export DEPLOYPATH=/home/campetapp/public_html
    - export COMPOSER_ALLOW_SUPERUSER=1
    - export PATH=/opt/cpanel/ea-php81/root/usr/bin:$PATH

    # 2. Sincronizar SOLO el archivo del visor de contraseña (Login.php)
    - rsync -avz --exclude='*' --include='app/Filament/Pages/Login.php' --include='app/Filament/Pages/' --include='app/Filament/' --include='app/' . $DEPLOYPATH/

    # 3. Limpiar caché de vistas de Laravel/Filament
    - php $DEPLOYPATH/artisan view:clear

    # 4. Optimizar configuración
    - php $DEPLOYPATH/artisan config:cache

    # 5. Configurar permisos seguros (chmod sí está permitido para tu propio usuario)
    - chmod -R 755 $DEPLOYPATH/app

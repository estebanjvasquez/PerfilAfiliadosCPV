<!-- ======================================================================= -->
<!-- N8N CHAT WIDGET - FIXED VERSION                                         -->
<!-- ======================================================================= -->
<div id="n8n-chat-widget" class="n8n-chat-widget">
    <button id="n8n-btn" class="n8n-chat-btn">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </button>
    <div id="n8n-window" class="n8n-chat-window">
        <div class="n8n-chat-header">
            <h3>CIRA Asistente</h3>
            <button class="n8n-chat-close">&times;</button>
        </div>
        <div id="n8n-messages" class="n8n-chat-body">
            <div style="text-align:center; padding:20px; opacity:0.6; font-size:0.9em;">
                ¡Hola! Soy CIRA. ¿En qué puedo ayudarte hoy?
            </div>
        </div>
        <div class="n8n-chat-footer">
            <textarea id="n8n-input" placeholder="Escribe aquí..." rows="1"></textarea>
            <button id="n8n-send">➤</button>
        </div>
    </div>
</div>

<style>
    /* Widget Styles */
    .n8n-chat-widget { --chat-color: #faa819; font-family: 'Inter', sans-serif; z-index: 999999; }
    .n8n-chat-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--chat-color); border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; border: none; color: white; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; z-index: 999999; }
    .n8n-chat-btn svg { width: 28px; height: 28px; fill: white; }
    .n8n-chat-window { position: fixed; bottom: 90px; right: 20px; width: 380px; height: 600px; max-height: 85vh; background: white; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; border: 1px solid #e0e0e0; z-index: 999999; }
    .n8n-chat-window.open { display: flex; }
    .n8n-chat-header { padding: 16px; background: var(--chat-color); color: white; display: flex; align-items: center; justify-content: space-between; }
    .n8n-chat-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    .n8n-chat-body { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
    .n8n-chat-msg { max-width: 90%; padding: 12px; border-radius: 10px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .n8n-chat-msg.user { align-self: flex-end; background: var(--chat-color); color: white; border-bottom-right-radius: 2px; }
    .n8n-chat-msg.bot { align-self: flex-start; background: white; color: #333; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
    .n8n-chat-footer { padding: 12px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; }
    .n8n-chat-footer textarea { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 14px; resize: none; height: 44px; outline: none; }
    .n8n-chat-footer button { background: var(--chat-color); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    
    /* Loading Dots */
    .typing-indicator span { animation: blink 1.4s infinite both; height: 7px; width: 7px; background: #888; border-radius: 50%; display: inline-block; margin: 0 1px; }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
</style>

<script>
(function() {
    const config = {
        // PRODUCTION URL (Must be Active in n8n)
        webhookUrl: 'https://vmi2945958.contaboserver.net/webhook-test/15eb9d1a-52a1-427c-b369-c51370ddbeb9' 
    };

    const btn = document.getElementById('n8n-btn');
    const win = document.getElementById('n8n-window');
    const close = document.querySelector('.n8n-chat-close');
    const msgs = document.getElementById('n8n-messages');
    const input = document.getElementById('n8n-input');
    const send = document.getElementById('n8n-send');
    let sessionId = localStorage.getItem('n8n_sid') || crypto.randomUUID();
    localStorage.setItem('n8n_sid', sessionId);

    function toggle() { win.classList.toggle('open'); if(win.classList.contains('open')) input.focus(); }
    btn.addEventListener('click', toggle);
    close.addEventListener('click', toggle);

    function addMsg(html, type) {
        const div = document.createElement('div');
        div.className = `n8n-chat-msg ${type}`;
        div.innerHTML = html;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    async function sendMsg() {
        const text = input.value.trim();
        if (!text) return;
        
        addMsg(text.replace(/\n/g, '<br>'), 'user');
        input.value = '';

        // Add Loader
        const loader = document.createElement('div');
        loader.className = 'n8n-chat-msg bot';
        loader.id = 'n8n-loader';
        loader.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        msgs.appendChild(loader);
        msgs.scrollTop = msgs.scrollHeight;

        try {
            const response = await fetch(config.webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: text, sessionId: sessionId })
            });

            const data = await response.json();
            
            // Remove Loader
            if(document.getElementById('n8n-loader')) document.getElementById('n8n-loader').remove();

            // --- FIXED LOGIC ---
            let reply = "";
            
            // Case 1: executionStarted (Means n8n isn't waiting)
            if (data.executionStarted) {
                reply = "⚠️ Error: El bot está procesando en segundo plano. Por favor configura el nodo 'Chat Trigger' en n8n con 'Response Mode: Response Node'.";
            }
            // Case 2: Success via Respond to Webhook Node
            else if (data.output) {
                reply = data.output;
            }
            // Case 3: Array fallback
            else if (Array.isArray(data) && data[0] && data[0].output) {
                reply = data[0].output;
            }
            else {
                reply = "Lo siento, hubo un error de formato. / Error format.";
                console.log("Raw Data:", data);
            }

            addMsg(reply, 'bot');

        } catch (err) {
            if(document.getElementById('n8n-loader')) document.getElementById('n8n-loader').remove();
            addMsg(`Error de conexión. Intente de nuevo.`, 'bot');
            console.error(err);
        }
    }

    send.addEventListener('click', sendMsg);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }});
})();
</script>
